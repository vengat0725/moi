<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Moi Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="app-shell">

  <!-- ================= HEADER / LEDGER SPINE ================= -->
  <header class="ledger-header">
    <div class="header-inner">
      <div class="header-mark" aria-hidden="true">
        <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
          <circle cx="17" cy="17" r="16" stroke="currentColor" stroke-width="1.4"/>
          <path d="M10 21c1.5-6 3-9 7-9s5.5 3 7 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <circle cx="17" cy="11" r="1.6" fill="currentColor"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>Moi Register</h1>
        <p class="header-sub">ஒன்றுக்கொன்று &mdash; what's given, what's owed</p>
      </div>
    </div>
  </header>

  <!-- ================= SUMMARY STRIP ================= -->
  <section class="summary-strip" aria-label="Summary">
    <div class="summary-card total-card">
      <span class="summary-label">Total Collected</span>
      <span class="summary-value" id="summaryTotal">₹0</span>
    </div>
    <div class="summary-card">
      <span class="summary-label">Entries</span>
      <span class="summary-value" id="summaryCount">0</span>
    </div>
  </section>

  <!-- ================= TOOLBAR ================= -->
  <section class="toolbar">
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="7" cy="7" r="5.2" stroke="currentColor" stroke-width="1.4"/>
        <line x1="11" y1="11" x2="14.5" y2="14.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search by name, relation, or event&hellip;" autocomplete="off">
    </div>
    <select id="sortSelect" aria-label="Sort entries">
      <option value="date_desc">Newest first</option>
      <option value="date_asc">Oldest first</option>
      <option value="amount_desc">Amount: high to low</option>
      <option value="amount_asc">Amount: low to high</option>
      <option value="name_asc">Name: A&ndash;Z</option>
    </select>
  </section>

  <!-- ================= EXPORT BAR ================= -->
  <section class="export-bar">
    <button class="btn-export" id="exportExcelBtn" type="button">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M5 5l6 6M11 5l-6 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      Excel
    </button>
    <button class="btn-export" id="exportPdfBtn" type="button">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M4 2h6l3 3v9H4V2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M6.5 9h.8c.6 0 1.1-.5 1.1-1.1S7.9 6.8 7.3 6.8H6.5V11M9.5 6.8h1.3v4.2M9.5 9h1" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
      PDF
    </button>
  </section>

  <!-- ================= LEDGER LIST ================= -->
  <main class="ledger-main">
    <div id="emptyState" class="empty-state" hidden>
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect x="8" y="6" width="32" height="38" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <line x1="14" y1="16" x2="34" y2="16" stroke="currentColor" stroke-width="1.5"/>
        <line x1="14" y1="23" x2="34" y2="23" stroke="currentColor" stroke-width="1.5"/>
        <line x1="14" y1="30" x2="26" y2="30" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <p class="empty-title">The register is empty</p>
      <p class="empty-sub">Tap the + button to record your first Moi entry.</p>
    </div>

    <ul class="entry-list" id="entryList" aria-live="polite"></ul>
  </main>

  <!-- ================= FAB ================= -->
  <button class="fab" id="addEntryBtn" aria-label="Add new entry">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
  </button>

</div>

<!-- ================= ENTRY FORM SHEET ================= -->
<div class="sheet-overlay" id="sheetOverlay">
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 id="sheetTitle">New Entry</h2>
      <button class="sheet-close" id="sheetCloseBtn" aria-label="Close">&times;</button>
    </div>
    <form id="entryForm" class="sheet-form">
      <input type="hidden" id="entryId">

      <label class="field">
        <span class="field-label">Guest Name <span class="req">*</span></span>
        <input type="text" id="guestName" required placeholder="e.g. Lakshmi Narayanan" autocomplete="off">
      </label>

      <div class="field-row">
        <label class="field">
          <span class="field-label">Amount (₹) <span class="req">*</span></span>
          <input type="number" id="amount" required min="0" step="1" placeholder="0" inputmode="decimal">
        </label>
        <label class="field">
          <span class="field-label">Date <span class="req">*</span></span>
          <input type="date" id="entryDate" required>
        </label>
      </div>

      <label class="field">
        <span class="field-label">Relation</span>
        <input type="text" id="relation" placeholder="e.g. Maternal Uncle, Neighbour" autocomplete="off" list="relationSuggestions">
        <datalist id="relationSuggestions">
          <option value="Father's side">
          <option value="Mother's side">
          <option value="Friend">
          <option value="Neighbour">
          <option value="Colleague">
          <option value="Relative">
        </datalist>
      </label>

      <label class="field">
        <span class="field-label">Event</span>
        <input type="text" id="eventName" placeholder="e.g. Priya's Wedding" autocomplete="off">
      </label>

      <label class="field">
        <span class="field-label">Notes</span>
        <textarea id="notes" rows="2" placeholder="Optional remarks&hellip;"></textarea>
      </label>

      <div class="sheet-actions">
        <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn-primary" id="saveBtn">Save Entry</button>
      </div>
    </form>
  </div>
</div>

<!-- ================= DELETE CONFIRM ================= -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p class="confirm-title">Remove this entry?</p>
    <p class="confirm-sub" id="confirmSub"></p>
    <div class="confirm-actions">
      <button class="btn-secondary" id="confirmCancelBtn">Keep</button>
      <button class="btn-danger" id="confirmDeleteBtn">Remove</button>
    </div>
  </div>
</div>

<!-- ================= TOAST ================= -->
<div class="toast" id="toast"></div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
